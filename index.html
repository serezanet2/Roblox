<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Agusha Control · Лицензии (Dark/Light)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background 0.2s ease, border-color 0.2s, color 0.2s;
        }

        :root {
            --bg-gradient-start: #eef2f8;
            --bg-gradient-end: #d9e2ef;
            --card-bg: rgba(255, 255, 255, 0.98);
            --text-primary: #0b2b44;
            --text-secondary: #2c475f;
            --border-light: #e2edf7;
            --accent: #2c7da0;
            --accent-dark: #1f5e7a;
            --status-bg: #f0f5fb;
            --status-border: #2c7da0;
            --error-bg: #fff2f0;
            --error-border: #e03a3a;
            --warning-bg: #fff9e8;
            --warning-border: #f4b942;
            --btn-gradient: linear-gradient(100deg, #0f3f5e, #1a6285);
            --btn-hover: linear-gradient(100deg, #0a2f48, #11506e);
            --shadow: 0 25px 40px -14px rgba(0, 0, 0, 0.2);
        }

        body.dark {
            --bg-gradient-start: #121826;
            --bg-gradient-end: #1e2a3a;
            --card-bg: #1e2a3a;
            --text-primary: #eef2ff;
            --text-secondary: #b9d0f0;
            --border-light: #2d3e54;
            --accent: #3b9bcb;
            --accent-dark: #2c7da0;
            --status-bg: #17212b;
            --status-border: #3b9bcb;
            --error-bg: #2c1820;
            --error-border: #e06c6c;
            --warning-bg: #2a2418;
            --warning-border: #e6b450;
            --btn-gradient: linear-gradient(100deg, #1f4868, #2a6a8f);
            --btn-hover: linear-gradient(100deg, #153c57, #1b5575);
            --shadow: 0 25px 40px -14px rgba(0, 0, 0, 0.5);
        }

        body {
            background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .panel {
            max-width: 580px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 2rem;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .header {
            background: var(--accent-dark);
            padding: 1.2rem 2rem;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header h2 {
            font-size: 1.7rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .theme-toggle {
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 60px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            color: white;
            backdrop-filter: blur(4px);
            transition: 0.2s;
        }

        .theme-toggle:hover {
            background: rgba(255,255,255,0.35);
        }

        .content {
            padding: 2rem 1.8rem;
        }

        .field {
            margin-bottom: 1.6rem;
        }

        label {
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            display: block;
            margin-bottom: 0.5rem;
        }

        input, select {
            width: 100%;
            padding: 0.85rem 1rem;
            font-size: 1rem;
            border: 1.5px solid var(--border-light);
            border-radius: 1.2rem;
            background: var(--card-bg);
            color: var(--text-primary);
            transition: 0.2s;
            font-family: inherit;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(44, 125, 160, 0.2);
        }

        .hint {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 6px;
            margin-left: 8px;
            opacity: 0.8;
        }

        button {
            width: 100%;
            background: var(--btn-gradient);
            border: none;
            padding: 1rem;
            border-radius: 2rem;
            font-weight: 800;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 6px 12px -8px rgba(0,0,0,0.3);
        }

        button:hover:not(:disabled) {
            transform: scale(0.98);
            background: var(--btn-hover);
        }

        button:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .status-block {
            background: var(--status-bg);
            border-radius: 1.2rem;
            padding: 1rem 1.2rem;
            margin-top: 1.5rem;
            border-left: 5px solid var(--status-border);
            transition: 0.2s;
        }

        #statusMsg {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            word-break: break-word;
            color: var(--text-primary);
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.7s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 1.2rem;
            opacity: 0.7;
        }

        .rank-field-hidden {
            display: none !important;
        }

        .verify-btn {
            background: transparent;
            border: 1.5px solid var(--accent);
            color: var(--accent);
            margin-top: 12px;
            box-shadow: none;
            background: transparent;
            font-size: 0.85rem;
            padding: 0.6rem;
        }

        .verify-btn:hover:not(:disabled) {
            background: var(--accent);
            color: white;
            transform: none;
        }

        .small-buttons {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="panel">
    <div class="header">
        <h2>⚡ Agusha Control</h2>
        <button class="theme-toggle" id="themeToggle">🌙 Dark mode</button>
    </div>
    <div class="content">
        <div class="field">
            <label>🎯 Действие</label>
            <select id="action">
                <option value="add">➕ ADD — выдать лицензию</option>
                <option value="replace">🔄 REPLACE — заменить ранг</option>
                <option value="remove">❌ REMOVE — удалить лицензию</option>
            </select>
        </div>

        <div class="field">
            <label>👤 Ник игрока (Roblox)</label>
            <input type="text" id="username" placeholder="например: cng666setna, Builderman" autocomplete="off">
            <div class="hint">Точный логин — ID будет найден автоматически</div>
        </div>

        <div class="field" id="rankFieldWrapper">
            <label>🏷️ Ранг / уровень</label>
            <input type="text" id="level" placeholder="eco / pro / vip" list="rank-suggestions">
            <datalist id="rank-suggestions">
                <option>eco</option>
                <option>pro</option>
                <option>vip</option>
            </datalist>
            <div class="hint" id="rankHint">Для ADD/REPLACE обязательно. При REMOVE поле скрыто.</div>
        </div>

        <button id="executeBtn">
            <span>⚙️</span> ВЫПОЛНИТЬ ОПЕРАЦИЮ
        </button>

        <div class="small-buttons">
            <button id="checkRankBtn" class="verify-btn" style="margin-top:0;">🔍 Проверить ранг по ID</button>
        </div>

        <div class="status-block" id="statusBlock">
            <div id="statusMsg">
                <span>🟢</span> <span>Готов. Введите данные.</span>
            </div>
        </div>
        <div class="footer-note">
            🔐 Защищённое соединение · верификация через Roblox + Google Sheets
        </div>
    </div>
</div>

<script>
    // ---------- КОНФИГУРАЦИЯ (НЕ ИЗМЕНЯТЬ) ----------
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbzLcW3gukJOGNhxbGk0_mX-7qgi7XgIdrUax8rZVG4vxeW2SAueFQgEPbZsRPs_2n4TBw/exec";
    const AGUSHA_KEY = "0K3QotCe0KIg0JrQm9Cu0Kcg0KHQn9CV0KbQkNCb0KzQndCr0Jkg0JPQo9CT0Jsg0JDQk9Cj0KjQkA==";

    // DOM элементы
    const actionSelect = document.getElementById("action");
    const usernameInput = document.getElementById("username");
    const levelInput = document.getElementById("level");
    const rankWrapper = document.getElementById("rankFieldWrapper");
    const executeBtn = document.getElementById("executeBtn");
    const statusMsgDiv = document.getElementById("statusMsg");
    const statusBlock = document.getElementById("statusBlock");
    const themeToggle = document.getElementById("themeToggle");
    const checkRankBtn = document.getElementById("checkRankBtn");

    // ----- Тёмная тема -----
    function initTheme() {
        const saved = localStorage.getItem("agusha_theme");
        if (saved === "dark") {
            document.body.classList.add("dark");
            themeToggle.innerHTML = "☀️ Light mode";
        } else {
            document.body.classList.remove("dark");
            themeToggle.innerHTML = "🌙 Dark mode";
        }
    }
    function toggleTheme() {
        if (document.body.classList.contains("dark")) {
            document.body.classList.remove("dark");
            localStorage.setItem("agusha_theme", "light");
            themeToggle.innerHTML = "🌙 Dark mode";
        } else {
            document.body.classList.add("dark");
            localStorage.setItem("agusha_theme", "dark");
            themeToggle.innerHTML = "☀️ Light mode";
        }
    }
    themeToggle.addEventListener("click", toggleTheme);
    initTheme();

    // ----- Скрытие поля ранга при REMOVE -----
    function toggleRankField() {
        const action = actionSelect.value;
        if (action === "remove") {
            rankWrapper.style.display = "none";
            levelInput.removeAttribute("required");
        } else {
            rankWrapper.style.display = "block";
            if (action === "add" || action === "replace") levelInput.setAttribute("required", "required");
        }
    }
    actionSelect.addEventListener("change", toggleRankField);
    toggleRankField();

    // Вспомогательный статус
    function setStatus(message, isError = false, isLoading = false) {
        let icon = "🟢";
        if (isLoading) icon = "<span class='spinner'></span>";
        else if (isError) icon = "❌";
        else if (message.toLowerCase().includes("успешно")) icon = "✅";
        else if (message.toLowerCase().includes("найден")) icon = "🔍";
        statusMsgDiv.innerHTML = `<span>${icon}</span><span>${message}</span>`;
        
        if (isError) {
            statusBlock.style.borderLeftColor = "var(--error-border)";
            statusBlock.style.background = "var(--error-bg)";
        } else if (isLoading) {
            statusBlock.style.borderLeftColor = "var(--warning-border)";
            statusBlock.style.background = "var(--warning-bg)";
        } else {
            statusBlock.style.borderLeftColor = "var(--status-border)";
            statusBlock.style.background = "var(--status-bg)";
        }
    }

    // Поиск Roblox ID
    async function fetchRobloxUserId(username) {
        if (!username.trim()) throw new Error("Введите ник игрока");
        const clean = username.trim();
        const url = `https://users.roblox.com/v1/users/search?keyword=${encodeURIComponent(clean)}&limit=1`;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`Roblox API ошибка ${resp.status}`);
        const data = await resp.json();
        if (!data.data || data.data.length === 0) throw new Error(`Игрок "${clean}" не найден на Roblox`);
        const user = data.data[0];
        return { id: user.id, name: user.name };
    }

    // Отправка POST (no-cors) — гарантированно уходит, но без чтения ответа
    async function sendNoCorsPost(action, userId, level) {
        const payload = {
            key: AGUSHA_KEY,
            action: action,
            id: String(userId),
            level: level || ""
        };
        const bodyString = JSON.stringify(payload);
        await fetch(GOOGLE_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "text/plain" },
            body: bodyString
        });
        return true;
    }

    // Получение ранга через GET (с таймаутом)
    async function getUserLevelFromSheet(userId) {
        const getUrl = `${GOOGLE_URL}?id=${encodeURIComponent(String(userId))}`;
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 7000);
        try {
            const resp = await fetch(getUrl, { method: "GET", signal: controller.signal });
            clearTimeout(timeoutId);
            if (!resp.ok) return "none";
            const text = await resp.text();
            const cleaned = text.trim();
            if (cleaned === "" || cleaned === "none") return "none";
            return cleaned;
        } catch (err) {
            console.warn("GET verification error", err);
            return "unknown";
        }
    }

    // Интенсивная верификация с повторами
    async function verifyWithRetries(action, userId, expectedLevel, maxRetries = 3, delayMs = 2000) {
        for (let i = 0; i < maxRetries; i++) {
            await new Promise(r => setTimeout(r, delayMs));
            let currentLevel = await getUserLevelFromSheet(userId);
            if (currentLevel === "unknown") continue;
            
            if (action === "remove") {
                if (currentLevel === "none") return { success: true, message: "Лицензия удалена, ранг отсутствует." };
            } else if (action === "add") {
                if (currentLevel === expectedLevel) return { success: true, message: `Ранг "${expectedLevel}" подтверждён в таблице.` };
            } else if (action === "replace") {
                if (currentLevel === expectedLevel) return { success: true, message: `Ранг заменён на "${expectedLevel}".` };
            }
        }
        const finalLevel = await getUserLevelFromSheet(userId);
        if (action === "remove") {
            if (finalLevel === "none") return { success: true, message: "Лицензия удалена (финальная проверка)." };
            else return { success: false, message: `После удаления ранг всё ещё "${finalLevel}". Возможно, команда не сработала. Проверьте таблицу вручную.` };
        } else if (action === "add" || action === "replace") {
            if (finalLevel === expectedLevel) return { success: true, message: `Ранг "${expectedLevel}" подтверждён.` };
            else if (finalLevel === "none") return { success: false, message: `Ранг отсутствует, ожидался "${expectedLevel}". Операция не выполнена.` };
            else return { success: false, message: `Текущий ранг: "${finalLevel}", ожидался "${expectedLevel}". Обновление не прошло.` };
        }
        return { success: false, message: "Не удалось верифицировать изменение." };
    }

    // Основная логика
    async function processRequest() {
        const action = actionSelect.value;
        const usernameRaw = usernameInput.value;
        let levelRaw = levelInput.value.trim();

        if (!usernameRaw.trim()) {
            setStatus("Введите ник игрока!", true);
            return;
        }

        if ((action === "add" || action === "replace") && !levelRaw) {
            setStatus(`Для действия "${action.toUpperCase()}" необходимо указать ранг (eco, pro, vip)`, true);
            return;
        }

        executeBtn.disabled = true;
        const originalText = executeBtn.innerHTML;
        executeBtn.innerHTML = '<span class="spinner"></span> Обработка...';
        
        try {
            // 1. Поиск ID
            setStatus(`🔎 Поиск пользователя "${usernameRaw.trim()}" в Roblox...`, false, true);
            const userInfo = await fetchRobloxUserId(usernameRaw);
            const userId = userInfo.id;
            const exactName = userInfo.name;
            setStatus(`✅ Найден: ${exactName} (ID: ${userId}). Отправка запроса...`, false, true);
            
            // 2. Отправляем POST no-cors
            await sendNoCorsPost(action, userId, levelRaw);
            setStatus(`📡 Команда "${action.toUpperCase()}" отправлена. Ожидание обновления таблицы...`, false, true);
            
            // 3. Верификация с повторами (максимум 4 попытки, интервал 2 сек)
            let verifyResult;
            if (action === "remove") {
                verifyResult = await verifyWithRetries("remove", userId, null, 4, 2000);
            } else {
                verifyResult = await verifyWithRetries(action, userId, levelRaw, 4, 2000);
            }
            
            if (verifyResult.success) {
                setStatus(`✔️ УСПЕШНО! ${verifyResult.message}`, false);
                // Если удаление, дополнительно очищаем поле ранга на всякий случай
                if (action === "remove") {
                    levelInput.value = "";
                }
            } else {
                setStatus(`⚠️ ${verifyResult.message} Запрос был отправлен, но таблица не обновилась. Проверьте скрипт Google и права доступа.`, true);
            }
        } catch (err) {
            console.error(err);
            let errorMsg = err.message || "Неизвестная ошибка";
            if (errorMsg.includes("fetch") || errorMsg.includes("NetworkError")) {
                errorMsg = "Сетевая проблема. Возможно, запрос всё же ушёл. Проверьте таблицу вручную через некоторое время.";
            } else if (errorMsg.includes("Roblox API")) {
                errorMsg = `Ошибка Roblox: ${errorMsg}`;
            }
            setStatus(`❌ Ошибка: ${errorMsg}`, true);
        } finally {
            executeBtn.disabled = false;
            executeBtn.innerHTML = originalText;
        }
    }

    // Отдельная функция проверки ранга по ID (прямой ввод)
    async function checkRankByManualId() {
        const rawId = prompt("Введите числовой ID игрока (например, 3835408734):");
        if (!rawId) return;
        const id = String(rawId).trim();
        if (!/^\d+$/.test(id)) {
            setStatus("Некорректный ID, введите только цифры.", true);
            return;
        }
        setStatus(`🔍 Проверяем ранг для ID ${id}...`, false, true);
        try {
            const level = await getUserLevelFromSheet(id);
            if (level === "none") {
                setStatus(`📋 ID ${id} — нет активной лицензии (ранг: отсутствует)`);
            } else if (level === "unknown") {
                setStatus(`⚠️ Не удалось связаться с таблицей. Проверьте интернет.`, true);
            } else {
                setStatus(`🎫 ID ${id} — текущий ранг: "${level}"`);
            }
        } catch (e) {
            setStatus(`Ошибка проверки: ${e.message}`, true);
        }
    }

    // Обработчики
    executeBtn.addEventListener("click", processRequest);
    checkRankBtn.addEventListener("click", checkRankByManualId);
    
    // Enter в полях
    const inputs = [usernameInput, levelInput, actionSelect];
    inputs.forEach(inp => {
        inp.addEventListener("keypress", (e) => {
            if (e.key === "Enter" && !executeBtn.disabled) processRequest();
        });
    });

    // предзаполнение примера для удобства (не обязательно, но пользователь просил удалить у cng666setna)
    // просто подсказка: можно ввести ник
    setStatus("Статус: готов. Для удаления выберите REMOVE — поле ранга скроется.");
</script>
</body>
</html>
